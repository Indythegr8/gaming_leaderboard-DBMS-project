{% extends 'base.html' %}

{% block content %}
<div class="form-section">
    <div class="form-container">
        <div class="form-header">
            <h2>⚔️ Submit Score</h2>
            <p>Cement your legacy in the archives.</p>
        </div>

        <form action="{{ url_for('add_score') }}" method="POST">
            <div class="form-group">
                <label for="username">Gamer Tag</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" required
                           placeholder="e.g. ShadowHunter99"
                           autocomplete="off">
                </div>
            </div>

            <div class="form-group">
                <label for="game_id">Select Game</label>
                <div class="select-wrapper">
                    <select id="game_id" name="game_id" required>
                        <option value="" disabled selected>Choose your battlefield&hellip;</option>
                        {% for game in games %}
                            <option value="{{ game.game_id }}">{{ game.title }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="score">Score</label>
                <div class="input-wrapper">
                    <input type="number" id="score" name="score" required
                           placeholder="10000" min="0">
                </div>
            </div>

            <button type="submit" class="btn-submit">
                Submit Score <span class="arrow">&rarr;</span>
            </button>
        </form>
    </div>
</div>
{% endblock %}
