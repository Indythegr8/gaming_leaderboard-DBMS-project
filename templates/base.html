<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NexGen Gaming Leaderboard — Real-time rankings, player profiles, and competitive gaming stats.">
    <title>NexGen Gaming Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <a href="{{ url_for('index') }}" class="logo">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" class="logo-icon">
                    <path d="M4 14L14 3V10L20 10L10 21V14H4Z" fill="url(#logo-grad)"/>
                    <defs>
                        <linearGradient id="logo-grad" x1="4" y1="3" x2="20" y2="21" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#3b82f6"/>
                            <stop offset="1" stop-color="#22d3ee"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1>nexrise</h1>
            </a>

            <nav class="main-nav">
                <a href="{{ url_for('index') }}" class="nav-link active-link">Leaderboard</a>
                <a href="{{ url_for('add_score') }}" class="nav-link">Submit Score</a>
            </nav>

            <div class="header-right">
                <button class="icon-btn" title="Notifications">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M12 22C13.1 22 14 21.1 14 20H10C10 21.1 10.9 22 12 22ZM18 16V11C18 7.93 16.37 5.36 13.5 4.68V4C13.5 3.17 12.83 2.5 12 2.5C11.17 2.5 10.5 3.17 10.5 4V4.68C7.64 5.36 6 7.92 6 11V16L4 18V19H20V18L18 16ZM16 17H8V11C8 8.52 9.51 6.5 12 6.5C14.49 6.5 16 8.52 16 11V17Z" fill="currentColor"/>
                    </svg>
                </button>
                <div class="user-avatar-header">
                    <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=NexUser" alt="User Avatar">
                </div>
            </div>
        </header>

        <main class="content-area">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash-msg flash-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; 2026 NexGen Gaming Systems &mdash; Level up your legacy.</p>
        </footer>
    </div>
</body>
</html>
